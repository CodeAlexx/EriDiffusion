[build]
# Optimize for native CPU by default
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-gnu]
linker = "gcc"
rustflags = ["-C", "target-cpu=native"]

[profile.release-lto]
inherits = "release"
lto = "fat"
codegen-units = 1

[alias]
# Useful aliases
t = "test"
c = "check"
b = "build"
br = "build --release"
r = "run"
rr = "run --release"