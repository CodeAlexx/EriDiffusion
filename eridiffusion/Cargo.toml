[package]
name = "eridiffusion"
version = "0.1.0"
edition = "2021"

[features]
default = ["cuda"]
cuda = ["candle-core/cuda", "candle-nn/cuda", "cudarc/driver", "cudarc/nvrtc"]

[dependencies]
# External dependencies
anyhow = "1.0"
candle-core = { version = "0.9", default-features = false }
candle-nn = { version = "0.9", default-features = false, features = ["cuda"] }
candle-transformers = { version = "0.9", default-features = false }
safetensors = "0.4"
image = "0.25"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
cudarc = { version = "0.9", default-features = false, optional = true }
half = "2.3"
once_cell = "1.19"
rayon = "1.7"
num-traits = "0.2"
tokenizers = "0.15"

[[bin]]
name = "trainer"
path = "src/main.rs"

# Removed legacy binary that doesn't exist

[[example]]
name = "sd3_generate"
path = "examples/sd3_generate.rs"

[[example]]
name = "sd3_candle_demo"
path = "examples/sd3_candle_demo.rs"

[[example]]
name = "sd3_pipeline_example"
path = "examples/sd3_pipeline_example.rs"

[[bin]]
name = "test_components"
path = "src/bin/test_components.rs"

# Inference examples
[[example]]
name = "sdxl_generate"
path = "examples/inference/sdxl_generate.rs"

[[example]]
name = "sd15_generate"
path = "examples/inference/sd15_generate.rs"

[[example]]
name = "flux_generate"
path = "examples/inference/flux_generate.rs"

[[example]]
name = "run_all_models"
path = "examples/inference/run_all_models.rs"

[[example]]
name = "unified_pipeline"
path = "examples/inference/unified_pipeline.rs"