job: extension
config:
  name: "sdxl_lora_test"
  process:
    - type: 'sd_trainer'
      device: cuda:0
      trigger_word: ""
      
      network:
        type: "lora"
        linear: 16           # LoRA rank
        linear_alpha: 16     # LoRA alpha
      
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 4
        
      datasets:
        - folder_path: "/path/to/your/images"  # UPDATE THIS
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [1024]  # SDXL native resolution
          
      train:
        batch_size: 1
        steps: 1000
        gradient_accumulation: 4
        train_unet: true
        train_text_encoder: false  # Dual CLIP encoders not trained by default
        gradient_checkpointing: true
        noise_scheduler: "ddpm"
        optimizer: "adamw8bit"
        lr: 1e-4
        dtype: fp16
        
      model:
        name_or_path: "/home/alex/SwarmUI/Models/Stable-Diffusion/OfficialStableDiffusion/sd_xl_base_1.0.safetensors"
        arch: "sdxl"  # This tells the router to use SDXL trainer
        vae_path: "/home/alex/SwarmUI/Models/VAE/sdxl_vae.safetensors"  # If available
        text_encoder_path: "/home/alex/SwarmUI/Models/clip/clip_l.safetensors"  # CLIP-L
        text_encoder_2_path: "/home/alex/SwarmUI/Models/clip/clip_g.safetensors"  # CLIP-G
        
      # SDXL-specific settings
      sample:
        sampler: "ddpm"
        sample_every: 100
        width: 1024
        height: 1024
        prompts: 
          - "a test image"
        seed: 42
        guidance_scale: 7.5
        sample_steps: 50