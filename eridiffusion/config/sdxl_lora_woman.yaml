job: extension
config:
  name: "sdxl_lora_woman_test"
  process:
    - type: 'sd_trainer'
      device: cuda:0
      trigger_word: "40woman"  # Add trigger word for this dataset
      
      network:
        type: "lora"
        linear: 16           # LoRA rank
        linear_alpha: 16     # LoRA alpha
      
      save:
        dtype: float16
        save_every: 100      # Save more frequently for testing
        max_step_saves_to_keep: 2
        
      datasets:
        - folder_path: "/home/alex/diffusers-rs/datasets/40_woman"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [1024]  # SDXL native resolution
          
      train:
        batch_size: 1
        steps: 200           # Reduced for testing
        gradient_accumulation: 2
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "ddpm"
        optimizer: "adamw8bit"
        lr: 5e-5            # Conservative learning rate
        dtype: fp16
        
      model:
        name_or_path: "/home/alex/SwarmUI/Models/Stable-Diffusion/OfficialStableDiffusion/sd_xl_base_1.0.safetensors"
        arch: "sdxl"
        
      # SDXL-specific settings
      sample:
        sampler: "ddpm"
        sample_every: 50
        width: 1024
        height: 1024
        prompts: 
          - "40woman, portrait photo"
          - "40woman, wearing elegant dress"
          - "40woman, professional headshot"
        seed: 42
        guidance_scale: 7.5
        sample_steps: 30    # Reduced for faster sampling