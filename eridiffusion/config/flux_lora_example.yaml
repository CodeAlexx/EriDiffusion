job: extension
config:
  name: "flux_lora_test"
  process:
    - type: 'sd_trainer'
      device: cuda:0
      trigger_word: "zwx"
      network:
        type: "lora"
        linear: 32
        linear_alpha: 32.0
      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "/home/alex/diffusers-rs/datasets/40_woman"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [1024, 1024]
      train:
        batch_size: 1
        steps: 2000
        gradient_accumulation: 4
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1e-4
        dtype: bf16
        bypass_guidance_embedding: true  # Required for Flux
      model:
        name_or_path: "/home/alex/SwarmUI/Models/diffusion_models/flux1-dev.safetensors"
        is_flux: true
        quantize: false
        max_grad_norm: 1.0
        # Text encoder paths (optional - will auto-detect if not provided)
        t5_path: "/home/alex/SwarmUI/Models/clip/t5xxl_fp16.safetensors"
        clip_l_path: "/home/alex/SwarmUI/Models/clip/clip_l.safetensors"
      sample:
        sampler: "euler"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "zwx style, a beautiful mountain landscape at sunset"
          - "zwx style, a portrait of a person with dramatic lighting"
          - "zwx style, a futuristic cityscape with neon lights"
          - "zwx style, a serene forest with morning mist"
        neg: ""
        seed: 42
        guidance_scale: 3.5
        sample_steps: 28